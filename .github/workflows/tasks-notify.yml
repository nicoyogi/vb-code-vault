name: Ledger · Notify Near-Due Tasks

on:
  schedule:
    # 08:30 Asia/Bangkok (UTC+7) == 01:30 UTC, every day.
    - cron: '30 1 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print payload only, do not POST to Teams'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      near_due_days:
        description: 'Days ahead to consider near-due (default 3)'
        required: false
        default: '3'
      skip_if_empty:
        description: 'Skip posting when nothing is overdue/near-due'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

permissions:
  contents: read

concurrency:
  group: tasks-notify
  cancel-in-progress: false

# Opt in to Node.js 24 for JavaScript-based actions ahead of GitHub's June 2026
# default-switch. Silences the Node 20 deprecation warning on actions/checkout
# and actions/setup-node, since they still ship a Node 20 runtime today.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: scripts

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Send Teams notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          TEAMS_TASKS_WEBHOOK_URL: ${{ secrets.TEAMS_TASKS_WEBHOOK_URL }}
          TIMEZONE: Asia/Bangkok
          NEAR_DUE_DAYS: ${{ inputs.near_due_days || '3' }}
          SKIP_IF_EMPTY: ${{ inputs.skip_if_empty || 'true' }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: node notify-tasks-due.mjs
