name: Build Anmerkung .exe

# Builds the Electron-wrapped Anmerkung Processor as a Windows .exe.
# Runs on windows-latest so electron-builder can produce native NSIS +
# portable artifacts without needing Wine.

on:
  push:
    branches: [main]
    paths:
      - 'anmerkung.html'
      - 'assets/**'
      - 'manifest.webmanifest'
      - 'electron/**'
      - '.github/workflows/build-anmerkung-exe.yml'
  pull_request:
    paths:
      - 'anmerkung.html'
      - 'assets/**'
      - 'manifest.webmanifest'
      - 'electron/**'
      - '.github/workflows/build-anmerkung-exe.yml'
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write   # so release event can attach .exe to the release

jobs:
  build:
    name: Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Electron deps
        working-directory: electron
        run: npm install --no-audit --no-fund

      - name: Build Windows artifacts
        working-directory: electron
        env:
          # Don't try to load a code-signing cert; we ship unsigned for now.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # Lets electron-builder upload to a release if event=release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win

      - name: List build output
        if: always()
        run: |
          echo "::group::dist-electron"
          dir dist-electron
          echo "::endgroup::"
        shell: cmd

      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anmerkung-windows-exe
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest.yml
          if-no-files-found: error
          retention-days: 30

      - name: Attach .exe to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest.yml
