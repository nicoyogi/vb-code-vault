<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VB Code Vault</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f7f4;
      --surface: #ffffff;
      --surface2: #f1efe8;
      --border: rgba(0,0,0,0.12);
      --border2: rgba(0,0,0,0.22);
      --text: #1a1a18;
      --text2: #5f5e5a;
      --text3: #888780;
      --accent: #185FA5;
      --accent-bg: #E6F1FB;
      --accent-text: #0C447C;
      --green-bg: #EAF3DE;
      --green-text: #3B6D11;
      --red-bg: #FCEBEB;
      --red-text: #A32D2D;
      --red-border: #F09595;
      --mono: 'Courier New', Courier, monospace;
      --radius: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a;
        --surface: #252523;
        --surface2: #2c2c2a;
        --border: rgba(255,255,255,0.10);
        --border2: rgba(255,255,255,0.20);
        --text: #f0ede8;
        --text2: #b4b2a9;
        --text3: #888780;
        --accent: #378ADD;
        --accent-bg: #042C53;
        --accent-text: #85B7EB;
        --green-bg: #173404;
        --green-text: #C0DD97;
        --red-bg: #501313;
        --red-text: #F09595;
        --red-border: #791F1F;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 16px; color: var(--text); text-decoration: none; }
    .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; font-weight: 700; font-family: var(--mono); }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
    #total-badge { font-size: 12px; background: var(--surface2); border: 0.5px solid var(--border); border-radius: 20px; padding: 3px 10px; color: var(--text2); }

    /* Status indicator */
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #888780; flex-shrink: 0; transition: background 0.3s; }
    .status-dot.online { background: #639922; }
    .status-dot.error { background: #E24B4A; }
    .status-wrap { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text3); }

    /* Main */
    main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    /* Toolbar */
    .toolbar { display: flex; gap: 8px; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .toolbar input[type="text"] {
      flex: 1; min-width: 180px; height: 36px;
      border: 0.5px solid var(--border2); border-radius: var(--radius);
      padding: 0 12px; font-size: 14px;
      background: var(--surface); color: var(--text);
      outline: none; transition: border-color 0.15s;
    }
    .toolbar input[type="text"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
    .toolbar select {
      height: 36px; border: 0.5px solid var(--border2); border-radius: var(--radius);
      padding: 0 10px; font-size: 14px;
      background: var(--surface); color: var(--text);
      outline: none; cursor: pointer; min-width: 140px;
    }
    .btn-primary {
      height: 36px; background: var(--accent); color: white;
      border: none; border-radius: var(--radius);
      padding: 0 16px; font-size: 14px; font-weight: 500;
      cursor: pointer; white-space: nowrap; transition: opacity 0.15s;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm {
      height: 30px; background: transparent; border: 0.5px solid var(--border2);
      border-radius: var(--radius); padding: 0 12px; font-size: 12px;
      cursor: pointer; color: var(--text2); transition: background 0.12s; white-space: nowrap;
    }
    .btn-sm:hover { background: var(--surface2); }
    .btn-sm:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { color: var(--red-text); border-color: var(--red-border); }
    .btn-danger:hover { background: var(--red-bg); }

    /* Stats */
    .stats { font-size: 13px; color: var(--text3); margin-bottom: 1rem; }

    /* Snippet grid */
    .snippet-grid { display: grid; gap: 12px; }

    /* Card */
    .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; transition: border-color 0.15s; }
    .card:hover { border-color: var(--border2); }
    .card-header { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
    .card-title { font-size: 15px; font-weight: 500; flex: 1; }
    .card-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--accent-bg); color: var(--accent-text); font-weight: 500; }
    .date { font-size: 12px; color: var(--text3); margin-left: auto; }
    .card-desc { font-size: 13px; color: var(--text2); margin-bottom: 8px; line-height: 1.5; }

    /* ── Code preview (card) ── */
    .code-preview-wrap {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid #1a1a2e;
      margin-bottom: 2px;
    }
    .code-preview-bar {
      background: #1e1e2e;
      padding: 5px 10px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .code-dot { width: 8px; height: 8px; border-radius: 50%; }
    .copy-inline-btn {
      margin-left: auto;
      background: transparent;
      border: 1px solid #3d3d5c;
      border-radius: 4px;
      color: #6c7086;
      font-size: 11px;
      font-family: 'Consolas', monospace;
      padding: 2px 8px;
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .copy-inline-btn:hover { background: #2a2a3e; color: #cdd6f4; border-color: #6c7086; }
    .copy-inline-btn.copied { color: #a6e3a1; border-color: #a6e3a1; }
    .code-preview {
      background: #13131f;
      padding: 10px 12px 10px 0;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', var(--mono);
      font-size: 12px;
      overflow: hidden;
      max-height: 100px;
      line-height: 1.7;
      display: table;
      width: 100%;
      border-collapse: collapse;
    }
    .code-preview .ln {
      display: table-cell;
      width: 32px;
      min-width: 32px;
      text-align: right;
      padding-right: 10px;
      color: #3d3d5c;
      user-select: none;
      font-size: 11px;
      vertical-align: top;
      padding-left: 8px;
    }
    .code-preview .lc {
      display: table-cell;
      white-space: pre;
      color: #cdd6f4;
      padding-right: 12px;
    }
    .code-preview .cr { display: table-row; }

    /* ── Detail code view ── */
    .detail-code-wrap {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid #1a1a2e;
    }
    .detail-code-bar {
      background: #1e1e2e;
      padding: 7px 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .detail-code {
      background: #13131f;
      padding: 12px 12px 12px 0;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', var(--mono);
      font-size: 13px;
      color: #cdd6f4;
      flex: 1;
      overflow-y: auto;
      line-height: 1.7;
      display: table;
      width: 100%;
      border-collapse: collapse;
    }
    .detail-code .ln {
      display: table-cell;
      width: 42px;
      min-width: 42px;
      text-align: right;
      padding-right: 14px;
      padding-left: 10px;
      color: #3d3d5c;
      user-select: none;
      font-size: 12px;
      vertical-align: top;
      border-right: 1px solid #1e1e3a;
    }
    .detail-code .lc { display: table-cell; white-space: pre-wrap; word-break: break-word; padding-left: 14px; padding-right: 12px; }
    .detail-code .cr { display: table-row; }
    .detail-code .cr:hover { background: rgba(255,255,255,0.03); }

    /* VB Syntax colors (Catppuccin-inspired) */
    .kw  { color: #cba6f7; font-weight: 600; }   /* keywords */
    .str { color: #a6e3a1; }                       /* strings */
    .cmt { color: #6c7086; font-style: italic; }   /* comments */
    .num { color: #fab387; }                        /* numbers */
    .func{ color: #89b4fa; }                        /* functions/subs */
    .typ { color: #f38ba8; }                        /* types */
    .op  { color: #94e2d5; }                        /* operators */

    .card-actions { display: flex; gap: 6px; margin-top: 10px; }

    /* Skeleton loader */
    .skeleton { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; }
    .skel-line { background: var(--surface2); border-radius: 4px; height: 14px; margin-bottom: 10px; animation: shimmer 1.4s ease-in-out infinite; }
    @keyframes shimmer { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* Empty */
    .empty { text-align: center; color: var(--text3); padding: 4rem 1rem; font-size: 14px; }
    .empty-icon { font-size: 36px; margin-bottom: 12px; }

    /* Overlays */
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
    .overlay.open { display: flex; }

    /* Form modal */
    .modal { background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.5rem; width: min(540px, 100%); max-height: 92vh; overflow-y: auto; }
    .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 1.25rem; }
    .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .field label { font-size: 12px; color: var(--text2); font-weight: 500; }
    .field input[type="text"], .field select, .field textarea {
      width: 100%; border: 0.5px solid var(--border2); border-radius: var(--radius);
      padding: 8px 12px; font-size: 14px; background: var(--surface); color: var(--text);
      outline: none; font-family: inherit; transition: border-color 0.15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(24,95,165,0.12); }
    .field textarea { min-height: 220px; font-family: var(--mono); font-size: 13px; resize: vertical; line-height: 1.6; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

    /* Detail overlay */
    .detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
    .detail-overlay.open { display: flex; }
    .detail-box { background: var(--surface); border-radius: var(--radius-lg); border: 0.5px solid var(--border); padding: 1.25rem; width: min(700px, 100%); max-height: 88vh; display: flex; flex-direction: column; }
    .detail-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; flex-shrink: 0; }
    .detail-title { font-size: 16px; font-weight: 500; flex: 1; }
    .detail-code-wrap { flex: 1; min-height: 0; overflow: hidden; display: flex; flex-direction: column; border-radius: var(--radius); border: 1px solid #1a1a2e; }
    .detail-code-bar { flex-shrink: 0; }
    .detail-actions { display: flex; gap: 8px; margin-top: 10px; align-items: center; flex-shrink: 0; }
    .copy-ok { font-size: 12px; color: var(--green-text); }

    /* Toast */
    #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 999; white-space: nowrap; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.error-toast { background: #A32D2D; color: #fff; }

    @media (max-width: 540px) {
      header { padding: 0 1rem; }
      .toolbar { gap: 6px; }
      .toolbar select { min-width: 100px; }
    }
  </style>
</head>
<body>

<header>
  <a href="#" class="logo">
    <div class="logo-icon">VB</div>
    VB Code Vault
  </a>
  <div class="header-right">
    <div class="status-wrap">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-label">Connecting...</span>
    </div>
    <span id="total-badge">— snippets</span>
    <button class="btn-primary" id="add-btn" onclick="openAdd()">+ New snippet</button>
  </div>
</header>

<main>
  <div class="toolbar">
    <input type="text" id="search" placeholder="&#128269; Search by title, code, or description..." oninput="render()">
    <select id="filter-cat" onchange="render()">
      <option value="">All categories</option>
    </select>
  </div>
  <div id="stats" class="stats"></div>
  <div id="grid" class="snippet-grid"></div>
</main>

<!-- Form modal -->
<div class="overlay" id="form-modal" onclick="handleBgClick(event,'form-modal')">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modal-title">New snippet</h2>
    <div class="field"><label>Title *</label><input type="text" id="f-title" placeholder="e.g. File reader module"></div>
    <div class="field">
      <label>Category</label>
      <select id="f-cat">
        <option>General</option><option>Form</option><option>Database</option>
        <option>File I/O</option><option>String</option><option>Math</option>
        <option>UI</option><option>Network</option><option>Excel</option><option>Other</option>
      </select>
    </div>
    <div class="field"><label>Description</label><input type="text" id="f-desc" placeholder="Short description (optional)"></div>
    <div class="field"><label>VB Code *</label><textarea id="f-code" placeholder="Paste your VB code here..."></textarea></div>
    <div class="modal-actions">
      <button class="btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" id="save-btn" onclick="saveSnippet()">Save snippet</button>
    </div>
  </div>
</div>

<!-- Detail modal -->
<div class="detail-overlay" id="detail-modal" onclick="handleBgClick(event,'detail-modal')">
  <div class="detail-box" onclick="event.stopPropagation()">
    <div class="detail-header">
      <div style="flex:1">
        <div class="detail-title" id="d-title"></div>
        <div id="d-meta" style="margin-top:5px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;"></div>
      </div>
      <button class="btn-sm" onclick="closeDetail()">&#10005; Close</button>
    </div>
    <div id="d-desc" style="font-size:13px;color:var(--text2);margin-bottom:8px;flex-shrink:0;"></div>
    <div class="detail-code-wrap">
      <div class="detail-code-bar">
        <div class="code-dot" style="background:#ff5f57"></div>
        <div class="code-dot" style="background:#febc2e"></div>
        <div class="code-dot" style="background:#28c840"></div>
        <span style="margin-left:8px;font-size:11px;color:#6c7086;font-family:'Consolas',monospace" id="d-filename">snippet.vb</span>
      </div>
      <div id="d-code" class="detail-code"></div>
    </div>
    <div class="detail-actions">
      <button class="btn-sm" id="copy-btn" onclick="copyCode()">&#128203; Copy code</button>
      <button class="btn-sm" onclick="editFromDetail()">&#9998; Edit</button>
      <span class="copy-ok" id="copy-ok"></span>
    </div>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase SDK (compat version — works without bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
  /* ── VB Syntax Highlighter ── */
  function highlightVB(code) {
    const keywords = /\b(Sub|End Sub|Function|End Function|Dim|As|Integer|String|Boolean|Double|Long|Single|Date|Object|Variant|Byte|If|Then|Else|ElseIf|End If|For|To|Step|Next|Do|Loop|While|Wend|Until|Select|Case|End Select|With|End With|Class|End Class|Module|End Module|Property|Get|Set|Let|End Property|Return|Call|New|Nothing|True|False|Null|Empty|Me|MyBase|MyClass|Public|Private|Protected|Friend|Static|Shared|ReadOnly|Const|Enum|End Enum|Structure|End Structure|Interface|End Interface|Implements|Inherits|Imports|Namespace|End Namespace|Try|Catch|Finally|End Try|Throw|RaiseEvent|AddHandler|RemoveHandler|And|Or|Not|Xor|AndAlso|OrElse|Is|IsNot|Like|Mod|In|Of|ByVal|ByRef|Optional|ParamArray|Overrides|Overloads|Shadows|MustOverride|MustInherit|NotOverridable|NotInheritable|Handles|Delegate|Event|Declare|Extern|Exit|GoTo|Resume|On Error|Error|MsgBox|Print|Write|WriteLine|Input|Open|Close|Get|Put|Seek|Loc|LOF|EOF|FileLen|FreeFile|Dir|Kill|Name|MkDir|RmDir|ChDir|ChDrive|Shell|Environ|Format|CStr|CInt|CDbl|CBool|CLng|CSng|CByte|CDate|CObj|CType|TryCast|DirectCast|TypeOf|GetType|AddressOf)\b/g;
    const types = /\b(Integer|Long|Short|Byte|Single|Double|Decimal|Boolean|Char|String|Date|Object|Variant|Currency)\b/g;

    return code.split('\n').map((line, i) => {
      let safe = line
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      // Comments (must be first — skip rest of line)
      safe = safe.replace(/(&#39;|')(.*$)/, '<span class="cmt">$1$2</span>');
      if (/^(\s*)(Rem\b.*)$/i.test(safe)) {
        safe = safe.replace(/^(\s*)(Rem\b.*)$/i, '$1<span class="cmt">$2</span>');
      }

      // Strings (only if no comment yet applied)
      if (!safe.includes('class="cmt"')) {
        safe = safe.replace(/"([^"]*)"/g, '<span class="str">"$1"</span>');
      }

      // Numbers
      safe = safe.replace(/\b(\d+\.?\d*)\b/g, '<span class="num">$1</span>');

      // Sub/Function names
      safe = safe.replace(/\b(Sub|Function|Property)\s+([A-Za-z_]\w*)/g,
        '<span class="kw">$1</span> <span class="func">$2</span>');

      // Keywords
      safe = safe.replace(keywords, m => `<span class="kw">${m}</span>`);

      // Operators
      safe = safe.replace(/(\s)(=|&lt;&gt;|&lt;=|&gt;=|&lt;|&gt;|&amp;|\+|-|\*|\/)(\s)/g,
        '$1<span class="op">$2</span>$3');

      return safe;
    });
  }

  function renderCodePreview(code, maxLines = 5) {
    const lines = highlightVB(code);
    const shown = lines.slice(0, maxLines);
    return shown.map((l, i) =>
      `<div class="cr"><span class="ln">${i+1}</span><span class="lc">${l}</span></div>`
    ).join('') + (lines.length > maxLines
      ? `<div class="cr"><span class="ln">…</span><span class="lc" style="color:#3d3d5c">+${lines.length - maxLines} more lines</span></div>`
      : '');
  }

  function renderDetailCode(code) {
    const lines = highlightVB(code);
    return lines.map((l, i) =>
      `<div class="cr"><span class="ln">${i+1}</span><span class="lc">${l}</span></div>`
    ).join('');
  }

  const firebaseConfig = {
    apiKey: "AIzaSyABb63nTxq-DY0CsHDtdJsUF4NBF7Cnrxw",
    authDomain: "vb-code-vault.firebaseapp.com",
    projectId: "vb-code-vault",
    storageBucket: "vb-code-vault.firebasestorage.app",
    messagingSenderId: "773245175115",
    appId: "1:773245175115:web:0b6a4f27388f58f026d4ce"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const col = db.collection('snippets');

  /* ── State ── */
  let snippets = [];
  let editId = null;
  let detailId = null;
  let saving = false;

  /* ── Status helpers ── */
  function setStatus(state, label) {
    const dot = document.getElementById('status-dot');
    const lbl = document.getElementById('status-label');
    dot.className = 'status-dot ' + (state || '');
    lbl.textContent = label;
  }

  /* ── Firestore: real-time listener ── */
  function startListener() {
    setStatus('', 'Connecting...');
    col.orderBy('createdAt', 'desc').onSnapshot(snap => {
      snippets = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      setStatus('online', 'Online');
      render();
    }, err => {
      console.error(err);
      setStatus('error', 'Error');
      showToast('Could not connect to database.', true);
    });
  }

  /* ── Render ── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function fmtDate(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
  }

  function render() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    const catFilter = document.getElementById('filter-cat').value;

    const cats = [...new Set(snippets.map(s => s.category).filter(Boolean))].sort();
    const sel = document.getElementById('filter-cat');
    const prev = sel.value;
    sel.innerHTML = '<option value="">All categories</option>' +
      cats.map(c => `<option${c === prev ? ' selected' : ''}>${esc(c)}</option>`).join('');

    let list = snippets.filter(s => {
      const matchQ = !q ||
        (s.title||'').toLowerCase().includes(q) ||
        (s.code||'').toLowerCase().includes(q) ||
        (s.desc||'').toLowerCase().includes(q);
      const matchCat = !catFilter || s.category === catFilter;
      return matchQ && matchCat;
    });

    const total = snippets.length;
    document.getElementById('total-badge').textContent = total + ' snippet' + (total !== 1 ? 's' : '');
    const statsEl = document.getElementById('stats');
    statsEl.textContent = (q || catFilter)
      ? `Showing ${list.length} of ${total} snippet${total !== 1 ? 's' : ''}`
      : total > 0 ? `${total} snippet${total !== 1 ? 's' : ''} stored` : '';

    const grid = document.getElementById('grid');
    if (!list.length) {
      grid.innerHTML = total === 0
        ? `<div class="empty"><div class="empty-icon">&#128190;</div><div>No snippets yet.</div><div style="margin-top:6px">Click <strong>+ New snippet</strong> to save your first VB code!</div></div>`
        : `<div class="empty"><div class="empty-icon">&#128269;</div><div>No snippets match your search.</div></div>`;
      return;
    }

    grid.innerHTML = list.map(s => {
      const highlighted = renderCodePreview(s.code || '');
      return `
        <div class="card">
          <div class="card-header"><div class="card-title">${esc(s.title||'')}</div></div>
          <div class="card-meta">
            <span class="badge">${esc(s.category||'General')}</span>
            <span class="date">${fmtDate(s.createdAt)}</span>
          </div>
          ${s.desc ? `<div class="card-desc">${esc(s.desc)}</div>` : ''}
          <div class="code-preview-wrap">
            <div class="code-preview-bar">
              <div class="code-dot" style="background:#ff5f57"></div>
              <div class="code-dot" style="background:#febc2e"></div>
              <div class="code-dot" style="background:#28c840"></div>
              <span style="margin-left:8px;font-size:10px;color:#6c7086;font-family:'Consolas',monospace">${esc(s.title||'snippet')}.vb</span>
              <button class="copy-inline-btn" onclick="copyInline(event,'${s.id}')">copy</button>
            </div>
            <div class="code-preview">${highlighted}</div>
          </div>
          <div class="card-actions">
            <button class="btn-sm" onclick="openDetail('${s.id}')">&#128065; View</button>
            <button class="btn-sm" onclick="openEdit('${s.id}')">&#9998; Edit</button>
            <button class="btn-sm btn-danger" onclick="deleteSnippet('${s.id}')">&#128465; Delete</button>
          </div>
        </div>`;
    }).join('');
  }

  /* ── Form modal ── */
  function openAdd() {
    editId = null;
    document.getElementById('modal-title').textContent = 'New snippet';
    document.getElementById('f-title').value = '';
    document.getElementById('f-desc').value = '';
    document.getElementById('f-code').value = '';
    document.getElementById('f-cat').value = 'General';
    document.getElementById('form-modal').classList.add('open');
    setTimeout(() => document.getElementById('f-title').focus(), 50);
  }

  function openEdit(id) {
    const s = snippets.find(x => x.id === id);
    if (!s) return;
    editId = id;
    document.getElementById('modal-title').textContent = 'Edit snippet';
    document.getElementById('f-title').value = s.title || '';
    document.getElementById('f-desc').value = s.desc || '';
    document.getElementById('f-code').value = s.code || '';
    document.getElementById('f-cat').value = s.category || 'General';
    closeDetail();
    document.getElementById('form-modal').classList.add('open');
    setTimeout(() => document.getElementById('f-title').focus(), 50);
  }

  function closeModal() { document.getElementById('form-modal').classList.remove('open'); }

  async function saveSnippet() {
    if (saving) return;
    const title = document.getElementById('f-title').value.trim();
    const code  = document.getElementById('f-code').value.trim();
    const desc  = document.getElementById('f-desc').value.trim();
    const category = document.getElementById('f-cat').value;

    if (!title) { document.getElementById('f-title').focus(); showToast('Please enter a title.', true); return; }
    if (!code)  { document.getElementById('f-code').focus();  showToast('Please paste some VB code.', true); return; }

    saving = true;
    const btn = document.getElementById('save-btn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      if (editId) {
        await col.doc(editId).update({ title, desc, code, category, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
        showToast('Snippet updated!');
      } else {
        await col.add({ title, desc, code, category, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
        showToast('Snippet saved!');
      }
      closeModal();
    } catch(e) {
      console.error(e);
      showToast('Save failed. Check your connection.', true);
    } finally {
      saving = false;
      btn.disabled = false;
      btn.textContent = 'Save snippet';
    }
  }

  /* ── Detail modal ── */
  function openDetail(id) {
    const s = snippets.find(x => x.id === id);
    if (!s) return;
    detailId = id;
    document.getElementById('d-title').textContent = s.title || '';
    document.getElementById('d-meta').innerHTML =
      `<span class="badge">${esc(s.category||'General')}</span><span style="font-size:12px;color:var(--text3)">${fmtDate(s.createdAt)}</span>`;
    document.getElementById('d-desc').textContent = s.desc || '';
    document.getElementById('d-code').innerHTML = renderDetailCode(s.code || '');
    document.getElementById('d-filename').textContent = (s.title || 'snippet').replace(/[^a-z0-9_\-]/gi,'_').toLowerCase() + '.vb';
    document.getElementById('copy-btn').textContent = '\uD83D\uDCCB Copy code';
    document.getElementById('copy-ok').textContent = '';
    document.getElementById('detail-modal').classList.add('open');
  }

  function closeDetail() { document.getElementById('detail-modal').classList.remove('open'); }
  function editFromDetail() { if (detailId) openEdit(detailId); }

  function copyCode() {
    const s = snippets.find(x => x.id === detailId);
    if (!s) return;
    navigator.clipboard.writeText(s.code || '').then(() => {
      document.getElementById('copy-btn').textContent = '\u2713 Copied!';
      document.getElementById('copy-ok').textContent = 'Code copied to clipboard';
      setTimeout(() => {
        document.getElementById('copy-btn').textContent = '\uD83D\uDCCB Copy code';
        document.getElementById('copy-ok').textContent = '';
      }, 2000);
    }).catch(() => showToast('Copy failed — please select manually.', true));
  }

  /* ── Copy inline (card bar) ── */
  function copyInline(e, id) {
    e.stopPropagation();
    const s = snippets.find(x => x.id === id);
    if (!s) return;
    navigator.clipboard.writeText(s.code || '').then(() => {
      const btn = e.currentTarget;
      btn.textContent = '✓ copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'copy';
        btn.classList.remove('copied');
      }, 2000);
    }).catch(() => showToast('Copy failed — please select manually.', true));
  }

  /* ── Delete ── */
  async function deleteSnippet(id) {
    if (!confirm('Delete this snippet? This cannot be undone.')) return;
    try {
      await col.doc(id).delete();
      showToast('Snippet deleted.');
    } catch(e) {
      showToast('Delete failed. Check your connection.', true);
    }
  }

  /* ── Helpers ── */
  function handleBgClick(e, id) {
    if (e.target === document.getElementById(id)) document.getElementById(id).classList.remove('open');
  }

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = isError ? 'error-toast show' : 'show';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, 2500);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeModal(); closeDetail(); }
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') { e.preventDefault(); document.getElementById('search').focus(); }
  });

  /* ── Show skeletons while loading ── */
  document.getElementById('grid').innerHTML = [1,2,3].map(() => `
    <div class="skeleton">
      <div class="skel-line" style="width:55%"></div>
      <div class="skel-line" style="width:25%;height:10px"></div>
      <div class="skel-line" style="width:100%;height:60px"></div>
    </div>`).join('');

  startListener();
</script>
</body>
</html>
